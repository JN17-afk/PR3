<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemelo Digital - FlexSim & ESP32</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
</head>
<body>

    <header>
        <h1>Dashboard Gemelo Digital</h1>
        <div id="status-container">
            Estado Broker: <span id="mqtt-status" class="disconnected">Desconectado</span>
        </div>
    </header>

    <main class="dashboard-grid">
        
        <section class="card">
            <h2>Control Remoto</h2>
            <p>Envía comandos al sistema físico o virtual.</p>
            <div class="btn-group">
                <button id="btn-led-on" onclick="enviarComando('esp32/led', '1')">Encender LED (Físico)</button>
                <button id="btn-led-off" onclick="enviarComando('esp32/led', '0')">Apagar LED (Físico)</button>
            </div>
            <div class="btn-group" style="margin-top: 15px;">
                <button id="btn-sim-start" onclick="enviarComando('flexsim/control', 'start')">Iniciar Simulación</button>
                <button id="btn-sim-stop" onclick="enviarComando('flexsim/control', 'stop')">Pausar Simulación</button>
            </div>
        </section>

        <section class="card">
            <h2>Estado de la Simulación (FlexSim)</h2>
            <div class="metric">
                <h3>Contador de Cajas</h3>
                <p id="txt-contador-cajas" class="value">0</p>
            </div>
            <div class="metric">
                <h3>Estado de Planta</h3>
                <p id="txt-estado-sim" class="value-text">Esperando...</p>
            </div>
        </section>

        <section class="card">
            <h2>Estado de Hardware (ESP32-S3)</h2>
            <div class="metric">
                <h3>Sensor Físico</h3>
                <p id="txt-sensor-fisico" class="value">--</p>
            </div>
            <div class="metric">
                <h3>Última Alerta</h3>
                <p id="txt-alerta-hardware" class="value-text">Ninguna</p>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
